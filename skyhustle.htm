<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyHustle // Torn Travel Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d10;
        }
        .torn-mono {
            font-family: 'Share Tech Mono', monospace;
        }
        .glow-red {
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="border-b border-red-900/40 bg-[#121216] p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-red-500 torn-mono glow-red">
                SKYHUSTLE <span class="text-gray-500 text-xs">// TRAVEL OPTIMIZER</span>
            </h1>
            <div id="api-status" class="text-xs bg-zinc-900 px-2 py-1 rounded border border-zinc-800 text-zinc-400">
                Checking API Key...
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
        
        <!-- Controls Panel -->
        <section class="bg-[#121216] border border-zinc-800 rounded-lg p-4 shadow-md">
            <h2 class="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-3 torn-mono">Flight Parameters</h2>
            
            <div class="space-y-3">
                <!-- Capacity Input -->
                <div>
                    <label class="block text-xs text-zinc-500 mb-1 uppercase font-bold">Item Capacity (Luggage)</label>
                    <input type="number" id="capacity" value="29" min="1" 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-white focus:outline-none focus:border-red-500 transition">
                </div>

                <!-- Time Filter Logic -->
                <div>
                    <label class="block text-xs text-zinc-500 mb-1 uppercase font-bold">Available Travel Window</label>
                    <select id="time-window" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-sm text-white focus:outline-none focus:border-red-500 transition">
                        <option value="any">Anytime (Maximize Profit Per Minute)</option>
                        <option value="short">Day Quickies (Under 1 Hour Round Trip)</option>
                        <option value="medium">Mid-Range (1 to 4 Hours Round Trip)</option>
                        <option value="long">Overnight / Long Haul (4+ Hours Round Trip)</option>
                    </select>
                    <span id="auto-time-notice" class="text-[10px] text-zinc-500 mt-1 block"></span>
                </div>
            </div>
            
            <button id="refresh-btn" class="w-full mt-4 bg-red-700 hover:bg-red-600 active:bg-red-800 text-white font-bold py-2 px-4 rounded transition torn-mono text-sm tracking-wider shadow-lg">
                RUN OPTIMIZER
            </button>
        </section>

        <!-- Results Panel -->
        <section>
            <h2 class="text-sm font-semibold text-zinc-400 uppercase tracking-wider mb-2 torn-mono px-1">Optimized Runs</h2>
            <div id="results-list" class="space-y-3">
                <div class="text-center py-8 text-zinc-600 text-sm">
                    Enter your API key in the URL (e.g., ?key=YOUR_KEY) to load data.
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="text-center p-4 text-xs text-zinc-600 border-t border-zinc-900 bg-[#070709]">
        Data sourced via Torn API. Fly safe, hustle hard.
    </footer>

    <!-- Application Logic -->
    <script>
        // Exact buy costs, flight costs, and flight times for all foreign flowers and plushies
        const DESTINATIONS = [
            { 
                name: 'Mexico', 
                flightCost: 9000, 
                time: 20, 
                items: [
                    { name: 'Jaguar Plushie', buyCost: 10000 },
                    { name: 'Dahlia', buyCost: 2000 }
                ]
            },
            { 
                name: 'Cayman Islands', 
                flightCost: 13500, 
                time: 25, 
                items: [
                    { name: 'Stingray Plushie', buyCost: 400 },
                    { name: 'Banana Orchid', buyCost: 4000 }
                ]
            },
            { 
                name: 'Canada', 
                flightCost: 11250, 
                time: 30, 
                items: [
                    { name: 'Wolverine Plushie', buyCost: 20 },
                    { name: 'Crocus', buyCost: 600 }
                ]
            },
            { 
                name: 'Hawaii', 
                flightCost: 27000, 
                time: 94, 
                items: [
                    { name: 'Orchid', buyCost: 700 }
                ]
            },
            { 
                name: 'United Kingdom', 
                flightCost: 38250, 
                time: 111, 
                items: [
                    { name: 'Red Fox Plushie', buyCost: 1000 },
                    { name: 'Heather', buyCost: 5000 }
                ]
            },
            { 
                name: 'Argentina', 
                flightCost: 40500, 
                time: 117, 
                items: [
                    { name: 'Monkey Plushie', buyCost: 400 },
                    { name: 'Ceibo', buyCost: 2000 }
                ]
            },
            { 
                name: 'Switzerland', 
                flightCost: 45000, 
                time: 123, 
                items: [
                    { name: 'Sheep Plushie', buyCost: 25 },
                    { name: 'Edelweiss', buyCost: 4000 }
                ]
            },
            { 
                name: 'Japan', 
                flightCost: 56250, 
                time: 159, 
                items: [
                    { name: 'Nessie Plushie', buyCost: 200 },
                    { name: 'Cherry Blossom', buyCost: 5000 }
                ]
            },
            { 
                name: 'China', 
                flightCost: 67500, 
                time: 169, 
                items: [
                    { name: 'Panda Plushie', buyCost: 400 },
                    { name: 'Peony', buyCost: 5000 }
                ]
            },
            { 
                name: 'UAE', 
                flightCost: 81000, 
                time: 178, 
                items: [
                    { name: 'Camel Plushie', buyCost: 14000 },
                    { name: 'Tribulus Omanense', buyCost: 6000 }
                ]
            },
            { 
                name: 'South Africa', 
                flightCost: 90000, 
                time: 208, 
                items: [
                    { name: 'Lion Plushie', buyCost: 400 },
                    { name: 'African Violet', buyCost: 2000 }
                ]
            }
        ];

        // Retrieve API key from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const apiKey = urlParams.get('key');
        
        const apiStatusEl = document.getElementById('api-status');
        const resultsListEl = document.getElementById('results-list');
        const refreshBtn = document.getElementById('refresh-btn');
        const timeWindowEl = document.getElementById('time-window');
        const autoTimeNoticeEl = document.getElementById('auto-time-notice');

        // Dynamic, contextual time logic based on current hour
        function setTimeDefaultBasedOnTimeOfDay() {
            const currentHour = new Date().getHours(); 
            
            if (currentHour >= 21 || currentHour < 4) {
                // After 9pm and before 4am -> Set to overnight
                timeWindowEl.value = 'long';
                autoTimeNoticeEl.textContent = "⚡ Auto-selected: Long Haul (It's late night. Time to sleep while flying!)";
            } else if (currentHour >= 8 && currentHour < 17) {
                // Daytime working hours
                timeWindowEl.value = 'medium';
                autoTimeNoticeEl.textContent = "⚡ Auto-selected: Mid-Range (Fits comfortably into daytime gaps)";
            } else if (currentHour >= 17 && currentHour < 21) {
                // Evening active hours
                timeWindowEl.value = 'any';
                autoTimeNoticeEl.textContent = "⚡ Auto-selected: Anytime (Flexible evening hours, looking for raw optimization)";
            } else {
                // Early morning
                timeWindowEl.value = 'short';
                autoTimeNoticeEl.textContent = "⚡ Auto-selected: Day Quickies (Morning sessions, quick hops)";
            }
        }

        // Initialize state
        setTimeDefaultBasedOnTimeOfDay();

        if (apiKey) {
            apiStatusEl.textContent = "API Key Detected";
            apiStatusEl.classList.remove('text-zinc-400');
            apiStatusEl.classList.add('text-green-500', 'border-green-900/50');
        } else {
            apiStatusEl.textContent = "Missing ?key= in URL";
            apiStatusEl.classList.remove('text-zinc-400');
            apiStatusEl.classList.add('text-amber-500', 'border-amber-900/50');
        }

        async function fetchTornMarketPrices() {
            if (!apiKey) {
                resultsListEl.innerHTML = `<div class="text-center py-4 text-amber-500 text-sm border border-amber-900/30 rounded bg-amber-950/20">Please add your API key to the URL parameter: <code>?key=YOUR_KEY</code></div>`;
                return;
            }

            resultsListEl.innerHTML = `<div class="text-center py-8 text-zinc-400 text-sm">Hacking Torn market feeds...</div>`;

            try {
                const response = await fetch(`https://api.torn.com/torn/?selections=items&key=${apiKey}`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.error || "API Error");
                }

                calculateBestRoutes(data.items);
            } catch (err) {
                resultsListEl.innerHTML = `<div class="text-center py-4 text-red-500 text-sm border border-red-900/30 rounded bg-red-950/20">Error: ${err.message}</div>`;
            }
        }

        function calculateBestRoutes(itemsData) {
            const capacity = parseInt(document.getElementById('capacity').value) || 29;
            const timeWindow = timeWindowEl.value;
            
            function getItemMarketValue(itemName) {
                let sampleValue = 40000; // Realistic placeholder logic if API maps weirdly
                for (let id in itemsData) {
                    if (itemsData[id].name.toLowerCase() === itemName.toLowerCase()) {
                        return itemsData[id].market_value;
                    }
                }
                return sampleValue;
            }

            let processedDestinations = [];

            DESTINATIONS.forEach(dest => {
                dest.items.forEach(item => {
                    const marketValue = getItemMarketValue(item.name);
                    const totalRevenue = marketValue * capacity;
                    
                    // Deduct BOTH actual flight ticket cost AND the local buy cost of the items
                    const totalCost = dest.flightCost + (item.buyCost * capacity);
                    const totalProfit = totalRevenue - totalCost;
                    const totalFlightTime = dest.time * 2; // Round trip in minutes
                    const profitPerMinute = totalProfit / totalFlightTime;

                    processedDestinations.push({
                        country: dest.name,
                        flightCost: dest.flightCost,
                        totalFlightTime: totalFlightTime,
                        itemName: item.name,
                        buyCost: item.buyCost,
                        marketValue: marketValue,
                        totalProfit: totalProfit,
                        profitPerMinute: profitPerMinute
                    });
                });
            });

            // Filtering out routes based on user's window
            if (timeWindow === 'short') {
                processedDestinations = processedDestinations.filter(d => d.totalFlightTime <= 60);
            } else if (timeWindow === 'medium') {
                processedDestinations = processedDestinations.filter(d => d.totalFlightTime > 60 && d.totalFlightTime <= 240);
            } else if (timeWindow === 'long') {
                processedDestinations = processedDestinations.filter(d => d.totalFlightTime > 240);
            }

            // Sort by profit efficiency (Profit per minute)
            processedDestinations.sort((a, b) => b.profitPerMinute - a.profitPerMinute);

            renderResults(processedDestinations);
        }

        function renderResults(routes) {
            resultsListEl.innerHTML = '';

            if (routes.length === 0) {
                resultsListEl.innerHTML = `<div class="text-center py-8 text-zinc-500 text-sm">No destinations fit this travel window.</div>`;
                return;
            }

            routes.forEach((route, index) => {
                const card = document.createElement('div');
                card.className = `border ${index === 0 ? 'border-red-500/40 bg-gradient-to-r from-red-950/20 to-zinc-900/40' : 'border-zinc-800 bg-zinc-900/40'} rounded-lg p-3 flex justify-between items-center shadow-sm`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-center space-x-2">
                            ${index === 0 ? '<span class="text-[10px] bg-red-600 text-white px-1 rounded font-bold torn-mono">BEST ROUTE</span>' : ''}
                            <h3 class="font-bold text-sm tracking-wide text-white">${route.country}</h3>
                        </div>
                        <p class="text-xs text-zinc-400 mt-1">Item: <span class="text-zinc-300 font-medium">${route.itemName}</span></p>
                        <p class="text-[10px] text-zinc-500 mt-0.5">Ticket: $${route.flightCost.toLocaleString()} | Buy Cost: $${route.buyCost.toLocaleString()}/ea</p>
                        <p class="text-[11px] text-zinc-400 mt-0.5">Round Trip Time: ${route.totalFlightTime} mins</p>
                    </div>
                    <div class="text-right">
                        <span class="text-sm font-bold torn-mono text-green-400">$${Math.floor(route.totalProfit).toLocaleString()}</span>
                        <p class="text-[10px] text-zinc-400 torn-mono">$${Math.floor(route.profitPerMinute).toLocaleString()}/min</p>
                    </div>
                `;
                resultsListEl.appendChild(card);
            });
        }

        // Event Listeners
        refreshBtn.addEventListener('click', fetchTornMarketPrices);
        timeWindowEl.addEventListener('change', () => {
            // Keep the text dynamic even if manually swapped
            autoTimeNoticeEl.textContent = "⚙️ Selection manually set.";
            if (apiKey) fetchTornMarketPrices();
        });

        // Trigger run on load if key is configured
        if (apiKey) {
            fetchTornMarketPrices();
        }
    </script>
</body>
</html>
