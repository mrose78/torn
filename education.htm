<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torn Education Tracker</title>
  <style>
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --border-color: #333;
      --text-main: #f0f0f0;
      --text-muted: #aaa;
      --accent: #2c1a06; /* Custom dark brown brand background */
      --accent-light: #442a0b;
      --green: #4caf50;
      --blue: #2196f3;
      --danger: #f44336;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-main);
      padding: 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-pill {
      background-color: var(--accent);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid var(--accent-light);
    }

    .api-control {
      display: flex;
      gap: 10px;
      flex-grow: 1;
      max-width: 500px;
    }

    input[type="password"] {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 4px;
      flex-grow: 1;
      font-family: monospace;
    }

    button {
      background-color: var(--accent-light);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background-color: var(--accent);
    }

    .profile-banner {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }

    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1.2rem;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .status-active {
      border-left: 4px solid var(--green);
    }

    .status-inactive {
      border-left: 4px solid var(--danger);
    }

    .course-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .course-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .progress-bar-container {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      height: 20px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
      position: relative;
    }

    .progress-bar {
      background-color: var(--green);
      height: 100%;
      width: 0%;
      transition: width 0.5s ease;
    }

    .progress-text {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 0;
      left: 0;
      font-size: 0.8rem;
      line-height: 20px;
      font-weight: bold;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-style: italic;
    }

    .history-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
    }

    .history-item {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .history-item-title {
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .history-item-dept {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .badge-completed {
      align-self: flex-start;
      margin-top: 8px;
      background-color: rgba(76, 175, 80, 0.15);
      color: var(--green);
      border: 1px solid var(--green);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .error-toast {
      background-color: var(--danger);
      color: #fff;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="error-box" class="error-toast"></div>

    <header>
      <div class="header-row">
        <h1>
          Torn Education Tracker 
          <span class="brand-pill">V2 Sync</span>
        </h1>
        <div class="api-control">
          <input type="password" id="api-key" placeholder="Enter Torn API Key" />
          <button id="sync-btn" onclick="fetchLiveData()">Sync With API</button>
        </div>
      </div>
      <div class="profile-banner">
        <span>User: <strong id="user-name">Not Synced</strong></span>
        <span>ID: <strong id="user-id">-</strong></span>
        <span>Status: <strong id="sync-status" style="color: var(--danger)">Offline</strong></span>
      </div>
    </header>

    <!-- Active Course Card -->
    <div class="card id-active-card status-inactive" id="active-course-card">
      <h2>Active Class</h2>
      <div id="active-course-content">
        <div class="empty-state">No Active Enrollment Found. Load your API key above to sync.</div>
      </div>
    </div>

    <!-- Completed Courses Card -->
    <div class="card">
      <h2>Completed Courses</h2>
      <div id="history-content">
        <div class="empty-state">No history recorded yet.</div>
      </div>
    </div>
  </div>

  <script>
    // App State
    const state = {
      username: null,
      playerId: null,
      activeCourse: null,
      completedCourses: []
    };

    // Helper to format remaining time
    function formatTimeRemaining(seconds) {
      if (seconds <= 0) return "Completed!";
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      
      let timeString = "";
      if (days > 0) timeString += `${days}d `;
      if (hours > 0 || days > 0) timeString += `${hours}h `;
      timeString += `${minutes}m`;
      return timeString;
    }

    // Main fetch routine
    async function fetchLiveData() {
      const apiKey = document.getElementById("api-key").value.trim();
      const errorBox = document.getElementById("error-box");
      const syncBtn = document.getElementById("sync-btn");

      // Reset errors
      errorBox.style.display = "none";
      errorBox.innerText = "";

      if (!apiKey) {
        errorBox.innerText = "Please enter an API Key.";
        errorBox.style.display = "block";
        return;
      }

      syncBtn.innerText = "Syncing...";
      syncBtn.disabled = true;

      try {
        // --- KEY CONFIGURATION CHANGE BELOW ---
        // Requesting 'profile' AND 'education' selections explicitly
        const url = `https://api.torn.com/user/?selections=profile,education&key=${apiKey}`;
        
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Torn API HTTP error: Status ${response.status}`);
        }

        const payload = await response.json();
        console.log("Torn API Response:", payload);

        if (payload.error) {
          throw new Error(payload.error.error || "Torn API returned an error response block.");
        }

        // 1. Map Profile Stats
        state.username = payload.name || "Unknown";
        state.playerId = payload.player_id || "N/A";

        // 2. Map Active Course (Highly defensive v2 parsing)
        const current = payload.education?.current;
        
        // Check if "current" exists and is not empty/null
        if (current && Object.keys(current).length > 0) {
          // Fallbacks for key name variables (id vs course_id, name vs course_name)
          const courseId = current.course_id || current.id || 0;
          const courseName = current.name || current.course_name || "Active Education Course";
          const department = current.department || "Academics";
          
          // Fallbacks for remaining time fields
          const secondsRemaining = current.seconds_remaining ?? current.seconds_left ?? current.time_remaining ?? 0;
          const totalSeconds = current.total_seconds ?? current.duration ?? (Number(secondsRemaining) + 1000);

          state.activeCourse = {
            id: Number(courseId),
            name: courseName,
            department: department,
            timeLeft: Number(secondsRemaining),
            totalDuration: Number(totalSeconds)
          };
        } else {
          state.activeCourse = null;
        }

        // 3. Map Completed Courses
        const completedData = payload.education?.completed || payload.education?.education_completed || {};
        state.completedCourses = [];
        
        // Check if completedData is an array or object of keys
        if (completedData) {
          if (Array.isArray(completedData)) {
            state.completedCourses = completedData.map(id => ({ id: Number(id), name: `Course ID: ${id}` }));
          } else {
            // If it is an object key-mapped { 12: "Computer Science Intro", 15: "Network Security" }
            Object.entries(completedData).forEach(([key, val]) => {
              state.completedCourses.push({
                id: Number(key),
                name: typeof val === "string" ? val : `Course ID: ${key}`
              });
            });
          }
        }

        // Update UI
        updateUI();

      } catch (err) {
        console.error(err);
        errorBox.innerText = `Error: ${err.message}`;
        errorBox.style.display = "block";
      } finally {
        syncBtn.innerText = "Sync With API";
        syncBtn.disabled = false;
      }
    }

    // UI Rendering Engine
    function updateUI() {
      // Header Info
      document.getElementById("user-name").innerText = state.username || "Not Synced";
      document.getElementById("user-id").innerText = state.playerId || "-";
      
      const syncStatus = document.getElementById("sync-status");
      syncStatus.innerText = "Live / Synced";
      syncStatus.style.color = "var(--green)";

      // Render Active Class Card
      const activeCard = document.getElementById("active-course-card");
      const activeContent = document.getElementById("active-course-content");

      if (state.activeCourse) {
        activeCard.className = "card id-active-card status-active";
        
        const rawProgress = 100 - ((state.activeCourse.timeLeft / state.activeCourse.totalDuration) * 100);
        const progressPercentage = Math.max(0, Math.min(100, Math.round(rawProgress || 0)));

        activeContent.innerHTML = `
          <div class="course-title">${state.activeCourse.name}</div>
          <div class="course-meta">Department: ${state.activeCourse.department} | Course ID: ${state.activeCourse.id}</div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: ${progressPercentage}%"></div>
            <div class="progress-text">${progressPercentage}% Complete</div>
          </div>
          <div style="font-size: 0.9rem; text-align: right; color: var(--text-muted)">
            Time Remaining: <strong>${formatTimeRemaining(state.activeCourse.timeLeft)}</strong>
          </div>
        `;
      } else {
        activeCard.className = "card id-active-card status-inactive";
        activeContent.innerHTML = `
          <div class="empty-state">You are not currently enrolled in any education courses. Go register at the City College!</div>
        `;
      }

      // Render Completed History Card
      const historyContent = document.getElementById("history-content");
      if (state.completedCourses.length > 0) {
        let historyHTML = `<div class="history-list">`;
        state.completedCourses.forEach(course => {
          historyHTML += `
            <div class="history-item">
              <div>
                <div class="history-item-dept">Completed</div>
                <div class="history-item-title">${course.name}</div>
              </div>
              <span class="badge-completed">Passed</span>
            </div>
          `;
        });
        historyHTML += `</div>`;
        historyContent.innerHTML = historyHTML;
      } else {
        historyContent.innerHTML = `
          <div class="empty-state">No completed courses returned. If you have completed courses, ensure you are using at least a Limited Access API key.</div>
        `;
      }
    }
  </script>
</body>
</html>
